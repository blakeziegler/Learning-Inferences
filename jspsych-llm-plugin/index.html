<!DOCTYPE html>
<html>
<head>
    <title>Local Test</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" />
    <script src="SummaryGrader.ts"></script>
    <script src="wordvecs10000.js"></script>
</head>
<body>
    <script>
        const jsPsych = initJsPsych();

        const preload = {
            type: jsPsychPreload,
            images: []
        };

        const mughal_text = {
            type: jsPsychSummarizeText,
            preamble: `Mughal Empire`,
            questions: [
                { prompt: `Zahir al-Din Muhammad Babur had always dreamed of founding a great empire...`, name: 'history1.1', rows: 5 },
                { prompt: `Despite his desire to become ruler of India...`, name: 'history1.2', rows: 5 },
                { prompt: `When Babur died in 1530, his eldest son Humayun inherited Mughal India...`, name: 'history1.3', rows: 5 },
                { prompt: `Humayun’s fourteen-year-old son Akbar inherited the throne...`, name: 'history1.4', rows: 5 }
            ]
        };

        const timeline = [preload, mughal_text];

        jsPsych.run(timeline);
    </script>
</body>
</html>
